<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explorador de Programas — QueEstudiar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #3B6FE8;
  --dark:    #1a1a2e;
  --gray:    #6b7280;
  --light:   #f4f5f7;
  --border:  #e5e7eb;
  --gold:    #f59e0b;
  --green:   #10b981;
  --red:     #ef4444;
  --bg:      #FAF6F0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* NAV */
.nav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo { font-size: 16px; font-weight: 800; color: var(--dark); }
.nav-logo span { color: var(--blue); }
.nav-links { display: flex; gap: 20px; font-size: 13px; color: var(--gray); }
.nav-links .active { color: var(--dark); font-weight: 600; }
.nav-cta {
  background: var(--blue); color: #fff; border: none;
  border-radius: 8px; padding: 7px 16px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}

/* FILTROS */
.filters-bar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  position: sticky;
  top: 56px;
  z-index: 99;
  flex-wrap: wrap;
}
.filter-search {
  flex: 1; min-width: 160px; max-width: 280px;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 7px 12px; font-size: 13px; color: #374151;
  background: #f9fafb; outline: none;
}
.filter-search:focus { border-color: var(--blue); }
.filter-select {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 7px 10px; font-size: 12px; color: #374151;
  background: #f9fafb; cursor: pointer;
}
.filter-count { font-size: 12px; color: #9ca3af; margin-left: auto; }

/* MAIN GRID */
.main { padding: 24px; }
.results-label { font-size: 12px; color: var(--gray); margin-bottom: 16px; }
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1080px;
  margin: 0 auto;
}
@media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px)  { .cards-grid { grid-template-columns: 1fr; } }

.load-more-wrap { text-align: center; margin-top: 32px; }
.btn-load-more {
  border: 1.5px solid var(--border); background: #fff;
  border-radius: 8px; padding: 10px 24px;
  font-size: 13px; color: var(--gray); cursor: not-allowed;
}

/* ─── CARD ─── */
.qe-card {
  background: #fff;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  display: flex;
  flex-direction: column;
}

/* Estados */
.qe-card:hover                { box-shadow: 0 8px 28px rgba(59,111,232,0.15); transform: translateY(-2px); }
.qe-card.is-favorited         { border-color: #fbbf24; }
.qe-card.is-compared          { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,111,232,0.12); }
.qe-card.is-favorited.is-compared { border-color: #fbbf24; }

/* HEADER */
.qe-card-header { position: relative; height: 100px; overflow: hidden; flex-shrink: 0; }
.qe-card-header-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.4s ease;
}
.qe-card:hover .qe-card-header-img { transform: scale(1.04); }
.qe-card-header-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,10,30,0.3) 0%, rgba(10,10,30,0.78) 100%);
}
.qe-card-header-content {
  position: absolute; inset: 0; padding: 10px 12px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.qe-card-header-top  { display: flex; justify-content: space-between; align-items: flex-start; }

.qe-badge-tipo {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 3px 8px; border-radius: 20px;
  background: rgba(255,255,255,0.18); color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
}
.qe-badge-tipo.master    { background: rgba(59,111,232,0.8); }
.qe-badge-tipo.grado     { background: rgba(16,185,129,0.8); }
.qe-badge-tipo.fp_superior { background: rgba(245,158,11,0.8); }
.qe-badge-tipo.doctorado { background: rgba(107,114,128,0.8); }
.qe-badge-seal {
  font-size: 9px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; background: #fde68a; color: #78350f;
}

.qe-card-title {
  font-size: 12px; font-weight: 700; color: #fff;
  line-height: 1.3; margin-bottom: 3px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.qe-card-univ {
  font-size: 10px; color: rgba(255,255,255,0.75);
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qe-logo-badge {
  width: 18px; height: 18px; background: #fff; border-radius: 3px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 800; color: var(--dark); flex-shrink: 0;
}

/* MÉTRICAS */
.qe-metrics { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.qe-metric  { flex: 1; padding: 7px 4px; text-align: center; border-right: 1px solid var(--border); }
.qe-metric:last-child { border-right: none; }
.qe-metric-val { font-size: 11px; font-weight: 700; color: var(--dark); display: block; line-height: 1.2; }
.qe-metric-val.empleo { color: var(--green); }
.qe-metric-val.na     { font-size: 9px; color: #9ca3af; }
.qe-metric-lbl { font-size: 8px; color: var(--gray); display: block; margin-top: 1px; }

/* BODY */
.qe-card-body { padding: 10px 12px 0; flex: 1; }
.qe-keywords  { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.qe-kw {
  font-size: 9px; background: #eff3ff; color: var(--blue);
  padding: 3px 7px; border-radius: 20px; font-weight: 500;
}
.qe-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
.qe-stars  { color: var(--gold); font-size: 11px; letter-spacing: -0.5px; }
.qe-rating-text { font-size: 10px; color: var(--gray); }

.qe-quickview-btn {
  font-size: 10px; color: var(--blue); background: none; border: none;
  cursor: pointer; padding: 0; display: flex; align-items: center; gap: 3px; font-weight: 500;
}
.qe-quickview-arrow { transition: transform 0.2s; display: inline-block; font-style: normal; }
.qe-quickview-btn.open .qe-quickview-arrow { transform: rotate(90deg); }
.qe-quickview-content {
  overflow: hidden; max-height: 0; transition: max-height 0.25s ease;
}
.qe-quickview-content.open { max-height: 60px; padding: 6px 0 2px; }
.qe-quickview-content span {
  display: inline-block; background: var(--light);
  padding: 2px 7px; border-radius: 4px;
  margin: 2px 2px 0 0; font-size: 9px; color: #374151;
}

/* FOOTER */
.qe-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px 12px; margin-top: 8px; border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.qe-price       { font-size: 14px; font-weight: 800; color: var(--dark); line-height: 1; }
.qe-saved-count { font-size: 9px; color: var(--gray); margin-top: 2px; }
.qe-actions     { display: flex; gap: 5px; align-items: center; }

.qe-btn-icon {
  width: 30px; height: 30px; border: 1.5px solid var(--border); border-radius: 8px;
  background: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.qe-btn-icon:hover            { background: var(--light); }
.qe-btn-icon.fav-active       { background: #fff9e6; border-color: #fbbf24; }
.qe-btn-icon.cmp-active       { background: #eff3ff; border-color: var(--blue); }
.qe-btn-icon.cmp-disabled     { opacity: 0.35; cursor: not-allowed; }
.qe-btn-icon.cmp-disabled:hover { background: #fff; }

.qe-btn-ver {
  background: var(--blue); color: #fff; border: none;
  border-radius: 8px; padding: 7px 12px; font-size: 11px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: background 0.15s;
}
.qe-btn-ver:hover { background: #2d5fd4; }

/* TOAST */
.qe-toast {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: #fff;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  z-index: 9999;
  animation: toastIn 0.2s ease;
  white-space: nowrap;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* BARRA COMPARADORA */
.compare-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: #1a1a2e;
  padding: 12px 24px;
  display: none;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
  animation: slideUp 0.25s ease;
}
.compare-bar.visible { display: flex; }
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.cmp-bar-label { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.cmp-bar-tipo  { font-size: 12px; font-weight: 700; color: #93c5fd; white-space: nowrap; }
.cmp-chips     { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.cmp-chip {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; color: #fff;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.cmp-chip-x {
  opacity: 0.55; cursor: pointer; font-size: 14px; line-height: 1;
  transition: opacity 0.15s;
}
.cmp-chip-x:hover { opacity: 1; }
.cmp-btn-now {
  background: var(--blue); color: #fff; border: none;
  border-radius: 8px; padding: 8px 16px;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.cmp-btn-now:hover { background: #2d5fd4; }
.cmp-btn-now:disabled { background: #6b7280; cursor: not-allowed; }
.cmp-btn-clear {
  background: transparent; color: rgba(255,255,255,0.4);
  border: none; font-size: 11px; cursor: pointer; white-space: nowrap;
}
.cmp-btn-clear:hover { color: rgba(255,255,255,0.9); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 300; display: none;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 16px;
  width: 100%; max-width: 760px; max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.2);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.modal-title  { font-size: 15px; font-weight: 700; color: var(--dark); }
.modal-close  { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray); line-height: 1; }
.modal-close:hover { color: var(--dark); }

.cmp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.cmp-table th {
  padding: 10px 14px; text-align: left;
  background: #f9fafb; font-weight: 600; color: var(--gray); font-size: 11px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 53px; z-index: 1;
}
.cmp-table th.prog-col { color: var(--dark); font-size: 11px; font-weight: 700; min-width: 160px; }
.cmp-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: #374151; vertical-align: top; }
.cmp-table td.attr { font-weight: 600; color: #6b7280; font-size: 11px; background: #fafafa; width: 100px; white-space: nowrap; }
.cmp-table tr:last-child td { border-bottom: none; }
.cmp-empleo-val { color: var(--green); font-weight: 700; }
.cmp-stars { color: var(--gold); font-size: 11px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
.modal-btn-close { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">que<span>estudiar</span>.es</div>
  <div class="nav-links">
    <span>Test vocacional</span>
    <span class="active">Explorador</span>
  </div>
  <button class="nav-cta">Contactar</button>
</nav>

<div class="filters-bar">
  <input class="filter-search" type="text" placeholder="Buscar programa..." id="searchInput">
  <select class="filter-select" id="filterTipo">
    <option value="">Todos los tipos</option>
    <option value="master">Máster</option>
    <option value="grado">Grado</option>
    <option value="fp_superior">FP Superior</option>
  </select>
  <span class="filter-count" id="resultCount"></span>
</div>

<main class="main">
  <div class="results-label" id="resultsLabel"></div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="load-more-wrap">
    <button class="btn-load-more" disabled>Ya has visto todos los resultados</button>
  </div>
</main>

<div class="compare-bar" id="compareBar" aria-live="polite" aria-label="Comparador de programas"></div>
<div class="modal-overlay" id="compareModal" role="dialog" aria-modal="true" aria-label="Comparativa de programas">
  <div class="modal-box" id="compareModalBox"></div>
</div>


<script>
const PROGRAMS = [
  {
    id: 'p1',
    nombre: 'MBA — Dirección y Administración de Empresas',
    universidad: 'Universidad Autónoma de Barcelona',
    ciudad: 'Barcelona',
    tipo: 'master',
    duracion: '1 año / 60 ECTS',
    modalidad: 'Presencial',
    idioma: 'Español / Inglés',
    precio_anual_eur: 12400,
    url_detalle: 'https://www.uab.cat',
    empleabilidad: 87,
    valoracion: 4.2,
    num_resenas: 23,
    sello: '⭐ Top 5 Ranking',
    keywords: ['🌍 Internacional', '💡 Innovación', '📊 Finanzas'],
    asignaturas: ['Dirección Estratégica', 'Marketing Global', 'Finanzas Corp.'],
    saved_count: 234,
  },
  {
    id: 'p2',
    nombre: 'Máster en Marketing Digital y E-commerce',
    universidad: 'ESIC Business School',
    ciudad: 'Madrid',
    tipo: 'master',
    duracion: '1 año / 60 ECTS',
    modalidad: 'Online',
    idioma: 'Español',
    precio_anual_eur: 7200,
    url_detalle: 'https://www.esic.edu',
    empleabilidad: 79,
    valoracion: 4.0,
    num_resenas: 31,
    sello: null,
    keywords: ['📱 Social Media', '🛒 E-commerce', '📈 Analytics'],
    asignaturas: ['Marketing Digital', 'SEO / SEM', 'Analítica Web'],
    saved_count: 89,
  },
  {
    id: 'p3',
    nombre: 'Máster en Inteligencia Artificial y Big Data',
    universidad: 'Universidad Politécnica de Madrid',
    ciudad: 'Madrid',
    tipo: 'master',
    duracion: '2 años / 120 ECTS',
    modalidad: 'Presencial',
    idioma: 'Español / Inglés',
    precio_anual_eur: 9500,
    url_detalle: 'https://www.upm.es',
    empleabilidad: 94,
    valoracion: 4.7,
    num_resenas: 52,
    sello: '🎓 Doble titulación',
    keywords: ['🤖 IA', '📊 Big Data', '☁️ Cloud'],
    asignaturas: ['Machine Learning', 'Python Avanzado', 'Estadística'],
    saved_count: 341,
  },
  {
    id: 'p4',
    nombre: 'Máster en Derecho Internacional y Relaciones Internacionales',
    universidad: 'Universidad Carlos III de Madrid',
    ciudad: 'Sevilla',
    tipo: 'master',
    duracion: '1 año / 60 ECTS',
    modalidad: 'Semipresencial',
    idioma: 'Español',
    precio_anual_eur: 6800,
    url_detalle: 'https://www.uc3m.es',
    empleabilidad: null,
    valoracion: 4.4,
    num_resenas: 18,
    sello: null,
    keywords: ['⚖️ Derecho', '🌐 Internacional', '🏛️ RRII'],
    asignaturas: ['Derecho Internacional Público', 'Diplomacia', 'Derecho UE'],
    saved_count: 67,
  },
];

const TIPO_LABELS = {
  master: 'Máster', grado: 'Grado',
  fp_superior: 'FP Superior', doctorado: 'Doctorado',
};
const MODALIDAD_ICONS = { Presencial: '🏛', Online: '💻', Semipresencial: '🔀' };

let _toastTimer = null;
function showToast(msg, duration = 2500) {
  if (_toastTimer) {
    clearTimeout(_toastTimer);
    document.querySelector('.qe-toast')?.remove();
  }
  const el = document.createElement('div');
  el.className = 'qe-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  _toastTimer = setTimeout(() => {
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
    _toastTimer = null;
  }, duration);
}

const FavoritosManager = (() => {
  const KEY = 'queestudiar_favoritos';

  const load = () => {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch { return []; }
  };

  const save = (ids) => localStorage.setItem(KEY, JSON.stringify(ids));

  return {
    has(id) { return load().includes(id); },

    getAll() { return load(); },

    toggle(id, savedCount) {
      const ids = load();
      const isNowFav = !ids.includes(id);
      const next = isNowFav ? [...ids, id] : ids.filter(x => x !== id);
      save(next);

      // Actualizar DOM de la card
      const card = document.getElementById(`card-${id}`);
      if (!card) return;
      card.classList.toggle('is-favorited', isNowFav);

      const btn = card.querySelector('.btn-fav');
      btn.textContent  = isNowFav ? '★' : '☆';
      btn.classList.toggle('fav-active', isNowFav);

      const counter = card.querySelector('.qe-saved-count');
      const base = savedCount ?? 0;
      counter.textContent = `♥ ${isNowFav ? base + 1 : base} lo guardaron`;

      if (isNowFav) showToast('✓ Guardado en tu lista');
    },
  };
})();

const ComparadorManager = (() => {
  const KEY = 'queestudiar_comparar';

  const load = () => {
    try { return JSON.parse(localStorage.getItem(KEY)) || { ids: [], tipo: null }; }
    catch { return { ids: [], tipo: null }; }
  };

  const save = (state) => localStorage.setItem(KEY, JSON.stringify(state));

  const updateCardBtn = (id, isActive, isDisabled) => {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    const btn = card.querySelector('.btn-cmp');
    if (!btn) return;
    btn.classList.toggle('cmp-active',   isActive);
    btn.classList.toggle('cmp-disabled', isDisabled);
    btn.title = isDisabled
      ? `Solo se pueden comparar ${TIPO_LABELS[ComparadorManager.getTipo()] || 'programas del mismo tipo'}s`
      : '';
  };

  return {
    getTipo() { return load().tipo; },
    getAll()  { return load().ids; },

    add(id, tipo, nombre) {
      const state = load();

      if (state.ids.includes(id)) return; // ya está — no hacer nada

      if (state.tipo && state.tipo !== tipo) {
        showToast(`Solo puedes comparar programas del mismo tipo. Limpia el comparador para empezar de nuevo.`);
        return;
      }
      if (state.ids.length >= 4) {
        showToast('Máximo 4 programas para comparar');
        return;
      }

      state.ids.push(id);
      if (!state.tipo) state.tipo = tipo;
      save(state);

      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.add('is-compared');
        card.querySelector('.btn-cmp').classList.add('cmp-active');
      }

      // Deshabilitar botones ⊕ de otros tipos
      PROGRAMS.forEach(p => {
        if (!state.ids.includes(p.id) && p.tipo !== state.tipo) {
          updateCardBtn(p.id, false, true);
        }
      });

      renderComparadorBar();
    },

    remove(id) {
      const state = load();
      state.ids = state.ids.filter(x => x !== id);
      if (state.ids.length === 0) state.tipo = null;
      save(state);

      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.remove('is-compared');
        card.querySelector('.btn-cmp').classList.remove('cmp-active');
      }

      // Si se vació, rehabilitar todos los botones ⊕
      if (!state.tipo) {
        PROGRAMS.forEach(p => updateCardBtn(p.id, false, false));
      }

      renderComparadorBar();
    },

    clear() {
      save({ ids: [], tipo: null });
      PROGRAMS.forEach(p => {
        const card = document.getElementById(`card-${p.id}`);
        if (card) card.classList.remove('is-compared');
        updateCardBtn(p.id, false, false);
      });
      renderComparadorBar();
    },
  };
})();

function renderCard(p) {
  const isFav = FavoritosManager.has(p.id);
  const isCmp = ComparadorManager.getAll().includes(p.id);
  const lockedTipo = ComparadorManager.getTipo();
  const isCmpDisabled = lockedTipo && lockedTipo !== p.tipo && !isCmp;

  const fmtPrice = (v) => v === 0 ? 'Gratuito' : `${Number(v).toLocaleString('es-ES')} €/año`;
  const starsHtml = (v) => {
    const full  = Math.floor(v);
    const empty = 5 - full;
    return '★'.repeat(full) + '☆'.repeat(empty);
  };
  const abbr = p.universidad.split(' ')
    .filter(w => w.length > 3)
    .slice(0, 3)
    .map(w => w[0])
    .join('')
    .toUpperCase()
    .slice(0, 4);

  const el = document.createElement('div');
  el.className = [
    'qe-card',
    isFav ? 'is-favorited' : '',
    isCmp ? 'is-compared'  : '',
  ].filter(Boolean).join(' ');
  el.id = `card-${p.id}`;

  el.innerHTML = `
    <div class="qe-card-header">
      <div class="qe-card-header-img" style="background-image:url('https://picsum.photos/seed/${p.id}/400/200')"></div>
      <div class="qe-card-header-overlay"></div>
      <div class="qe-card-header-content">
        <div class="qe-card-header-top">
          <span class="qe-badge-tipo ${p.tipo}">${TIPO_LABELS[p.tipo] || p.tipo}</span>
          ${p.sello ? `<span class="qe-badge-seal">${p.sello}</span>` : ''}
        </div>
        <div>
          <div class="qe-card-title">${p.nombre}</div>
          <div class="qe-card-univ">
            <span class="qe-logo-badge">${abbr}</span>
            ${p.universidad} · ${p.ciudad}
          </div>
        </div>
      </div>
    </div>

    <div class="qe-metrics">
      <div class="qe-metric">
        <span class="qe-metric-val empleo${p.empleabilidad == null ? ' na' : ''}">
          ${p.empleabilidad != null ? p.empleabilidad + '%' : 'Próx.'}
        </span>
        <span class="qe-metric-lbl">Empleo</span>
      </div>
      <div class="qe-metric">
        <span class="qe-metric-val">${p.duracion.split('/')[0].trim()}</span>
        <span class="qe-metric-lbl">Duración</span>
      </div>
      <div class="qe-metric">
        <span class="qe-metric-val">${MODALIDAD_ICONS[p.modalidad] || ''} ${p.modalidad}</span>
        <span class="qe-metric-lbl">Modalidad</span>
      </div>
    </div>

    <div class="qe-card-body">
      <div class="qe-keywords">
        ${p.keywords.map(k => `<span class="qe-kw">${k}</span>`).join('')}
      </div>
      <div class="qe-rating">
        <span class="qe-stars">${starsHtml(p.valoracion)}</span>
        <span class="qe-rating-text">${p.valoracion} · ${p.num_resenas} reseñas</span>
      </div>
      <button class="qe-quickview-btn" aria-expanded="false">
        <i class="qe-quickview-arrow">›</i>&nbsp;Vista rápida — 1.er año
      </button>
      <div class="qe-quickview-content" role="region">
        ${p.asignaturas.map(a => `<span>${a}</span>`).join('')}
      </div>
    </div>

    <div class="qe-card-footer">
      <div>
        <div class="qe-price">${fmtPrice(p.precio_anual_eur)}</div>
        <div class="qe-saved-count">♥ ${isFav ? p.saved_count + 1 : p.saved_count} lo guardaron</div>
      </div>
      <div class="qe-actions">
        <button class="qe-btn-icon btn-fav ${isFav ? 'fav-active' : ''}"
          title="${isFav ? 'Quitar de favoritos' : 'Guardar'}"
          aria-label="${isFav ? 'Quitar de favoritos' : 'Guardar programa'}"
          aria-pressed="${isFav}">
          ${isFav ? '★' : '☆'}
        </button>
        <button class="qe-btn-icon btn-cmp ${isCmp ? 'cmp-active' : ''} ${isCmpDisabled ? 'cmp-disabled' : ''}"
          title="${isCmpDisabled ? 'Solo se pueden comparar programas del mismo tipo' : isCmp ? 'Quitar del comparador' : 'Añadir al comparador'}"
          aria-label="Añadir al comparador"
          aria-pressed="${isCmp}"
          ${isCmpDisabled ? 'disabled' : ''}>
          ⊕
        </button>
        <a href="${p.url_detalle}" target="_blank" rel="noopener noreferrer"
          class="qe-btn-ver" aria-label="Ver programa oficial en nueva pestaña">
          Ver →
        </a>
      </div>
    </div>
  `;

  // Vista rápida — acordeón
  const qvBtn     = el.querySelector('.qe-quickview-btn');
  const qvContent = el.querySelector('.qe-quickview-content');
  qvBtn.addEventListener('click', () => {
    const isOpen = qvContent.classList.toggle('open');
    qvBtn.classList.toggle('open', isOpen);
    qvBtn.setAttribute('aria-expanded', isOpen);
  });

  // Favorito
  el.querySelector('.btn-fav').addEventListener('click', (e) => {
    e.stopPropagation();
    FavoritosManager.toggle(p.id, p.saved_count);
    el.querySelector('.btn-fav').setAttribute('aria-pressed', FavoritosManager.has(p.id));
  });

  // Comparar
  el.querySelector('.btn-cmp').addEventListener('click', (e) => {
    e.stopPropagation();
    if (ComparadorManager.getAll().includes(p.id)) {
      ComparadorManager.remove(p.id);
    } else {
      ComparadorManager.add(p.id, p.tipo, p.nombre);
    }
    el.querySelector('.btn-cmp').setAttribute('aria-pressed', ComparadorManager.getAll().includes(p.id));
  });

  return el;
}

function renderComparadorBar() {
  const bar  = document.getElementById('compareBar');
  const ids  = ComparadorManager.getAll();
  const tipo = ComparadorManager.getTipo();

  if (ids.length === 0) {
    bar.classList.remove('visible');
    bar.innerHTML = '';
    return;
  }

  const tipoLabel = tipo ? (TIPO_LABELS[tipo] + 'es') : 'Programas';
  const chips = ids.map(id => {
    const p = PROGRAMS.find(x => x.id === id);
    const shortName = p ? p.nombre.slice(0, 28) + (p.nombre.length > 28 ? '…' : '') : id;
    return '<span class="cmp-chip">' +
      shortName +
      '<span class="cmp-chip-x" data-remove="' + id + '" aria-label="Quitar ' + shortName + '">×</span>' +
      '</span>';
  }).join('');

  bar.innerHTML =
    '<span class="cmp-bar-label">Comparando:</span>' +
    '<span class="cmp-bar-tipo">' + tipoLabel + ' (' + ids.length + '/4)</span>' +
    '<div class="cmp-chips">' + chips + '</div>' +
    '<button class="cmp-btn-now"' + (ids.length < 2 ? ' disabled title="Añade al menos 2 programas"' : '') + '>Comparar ahora →</button>' +
    '<button class="cmp-btn-clear">Limpiar todo</button>';

  bar.classList.add('visible');

  bar.querySelectorAll('.cmp-chip-x').forEach(function(btn) {
    btn.addEventListener('click', function() { ComparadorManager.remove(btn.dataset.remove); });
  });
  bar.querySelector('.cmp-btn-now').addEventListener('click', function() {
    if (ids.length >= 2) renderModal();
  });
  bar.querySelector('.cmp-btn-clear').addEventListener('click', function() { ComparadorManager.clear(); });
}

function renderModal() {
  const ids   = ComparadorManager.getAll();
  const progs = ids.map(function(id) { return PROGRAMS.find(function(p) { return p.id === id; }); }).filter(Boolean);
  const tipo  = ComparadorManager.getTipo();
  const fmtPrice = function(v) { return v === 0 ? 'Gratuito' : Number(v).toLocaleString('es-ES') + ' €'; };
  const starsHtml = function(v) { return '★'.repeat(Math.floor(v)) + '☆'.repeat(5 - Math.floor(v)); };

  const progHeaders = progs.map(function(p) {
    return '<th class="prog-col">' + p.nombre.slice(0, 40) + (p.nombre.length > 40 ? '…' : '') + '</th>';
  }).join('');

  const rowDefs = [
    ['Universidad', function(p) { return p.universidad; }],
    ['Ciudad',      function(p) { return p.ciudad; }],
    ['Duración',    function(p) { return p.duracion; }],
    ['Modalidad',   function(p) { return (MODALIDAD_ICONS[p.modalidad] || '') + ' ' + p.modalidad; }],
    ['Idioma',      function(p) { return p.idioma; }],
    ['Precio/año', function(p) { return '<strong>' + fmtPrice(p.precio_anual_eur) + '</strong>'; }],
    ['Empleabilidad', function(p) {
      return p.empleabilidad != null
        ? '<span class="cmp-empleo-val">' + p.empleabilidad + '%</span>'
        : '<span style="color:#9ca3af">—</span>';
    }],
    ['Valoración', function(p) {
      return '<span class="cmp-stars">' + starsHtml(p.valoracion) + '</span> ' + p.valoracion + ' (' + p.num_resenas + ')';
    }],
    ['Sello', function(p) { return p.sello || '—'; }],
  ];

  const rows = rowDefs.map(function(def) {
    return '<tr><td class="attr">' + def[0] + '</td>' +
      progs.map(function(p) { return '<td>' + def[1](p) + '</td>'; }).join('') +
      '</tr>';
  }).join('');

  document.getElementById('compareModalBox').innerHTML =
    '<div class="modal-header">' +
      '<span class="modal-title">Comparativa de ' + (TIPO_LABELS[tipo] || 'Programas') + 's</span>' +
      '<button class="modal-close" aria-label="Cerrar">&times;</button>' +
    '</div>' +
    '<div style="overflow-x:auto">' +
      '<table class="cmp-table">' +
        '<thead><tr><th></th>' + progHeaders + '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div class="modal-footer">' +
      '<button class="modal-btn-close">Cerrar comparativa</button>' +
    '</div>';

  const modal = document.getElementById('compareModal');
  modal.classList.add('open');

  const close = function() { modal.classList.remove('open'); };
  modal.querySelector('.modal-close').addEventListener('click', close);
  modal.querySelector('.modal-btn-close').addEventListener('click', close);
  modal.addEventListener('click', function(e) { if (e.target === modal) close(); });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var m = document.getElementById('compareModal');
    if (m) m.classList.remove('open');
  }
});
</script>
</body>
</html>
