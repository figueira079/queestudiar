    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"¿Puedo estudiar en España si soy extranjero?","acceptedAnswer":{"@type":"Answer","text":"Sí. España admite estudiantes de todo el mundo en sus universidades y centros de formación profesional. Los ciudadanos de la UE tienen acceso en las mismas condiciones que los españoles. Los estudiantes extracomunitarios necesitan un visado de estudios tipo D, que se tramita en el consulado español de su país de residencia."}},{"@type":"Question","name":"¿Cuánto cuesta estudiar en España?","acceptedAnswer":{"@type":"Answer","text":"Los precios varían mucho según el tipo de programa y si la universidad es pública o privada. Los grados en universidades públicas cuestan entre 700 € y 3.000 € al año para residentes de la UE; entre 3.000 € y 18.000 € para estudiantes extracomunitarios. Los másteres oscilan entre 1.500 € y 20.000 € anuales. La FP Superior pública tiene tasas muy reducidas, habitualmente entre 400 € y 800 € al año."}},{"@type":"Question","name":"¿Qué diferencia hay entre grado, máster, FP Superior y doctorado?","acceptedAnswer":{"@type":"Answer","text":"El Grado universitario dura 4 años y da acceso a la mayoría de profesiones reguladas. El Máster dura 1–2 años y permite especializarse o acceder a la investigación. La FP Superior (Ciclo Formativo de Grado Superior) dura 2 años y tiene un enfoque práctico orientado al mercado laboral. El Doctorado dura entre 3 y 5 años y es el máximo nivel académico, orientado a la investigación."}},{"@type":"Question","name":"¿Cómo funciona el test vocacional?","acceptedAnswer":{"@type":"Answer","text":"El test consta de 5 preguntas sobre tu perfil académico, origen, área de interés y ciudad preferida. Tarda menos de 5 minutos. Al finalizar, el sistema cruza tu perfil con nuestra base de datos de más de 10.000 programas y te muestra los que mejor encajan con tus criterios."}},{"@type":"Question","name":"¿Necesito homologar mi título para estudiar en España?","acceptedAnswer":{"@type":"Answer","text":"Para acceder a un máster o doctorado en España, generalmente necesitas que tu título universitario extranjero sea reconocido. Esto puede hacerse mediante homologación oficial ante el Ministerio de Universidades, o mediante la declaración de equivalencia a nivel académico (sin efectos profesionales). Para los grados y la FP, los requisitos de acceso dependen de cada universidad o centro, aunque estudiantes internacionales suelen necesitar superar las pruebas de acceso PCE/UNED."}},{"@type":"Question","name":"¿En qué ciudades hay programas disponibles?","acceptedAnswer":{"@type":"Answer","text":"QueEstudiar recoge programas en 28 ciudades de toda España. Las principales son Madrid, Barcelona, Valencia, Sevilla, Bilbao, Granada, Salamanca, Málaga, Zaragoza y Murcia, entre otras."}}]}</script>
